# Two GPUs on one machine — simplest RPC setup
# Both GPUs are local, exposed to the coordinator via local rpc-server
# instances, so RPC overhead is minimal.
#
# Use case: You have a desktop with 2 NVIDIA GPUs and want to
# pool them for a model that doesn't fit on one card.

coordinator:
  host: 127.0.0.1
  port: 8080
  backend: cuda            # "cuda" (NVIDIA) or "hip" (AMD/ROCm)
  # Extra args passed to llama-server
  extra_args: []

# Each GPU is exposed via its own rpc-server on a distinct port.
# Tensor split is computed automatically, proportional to each GPU's vram_gb.
workers:
  - host: 127.0.0.1
    gpus:
      - name: RTX 4070 Ti Super
        vram_gb: 16
        rpc_port: 50052
  - host: 127.0.0.1
    gpus:
      - name: RTX 3060
        vram_gb: 12
        rpc_port: 50053

models:
  llama-70b:
    name: Llama 3.3 70B
    path: /models/llama-3.3-70b-instruct-Q4_K_M.gguf
    default: true

# Optional: override binary locations (default: resolve from PATH)
binaries:
  coordinator: /usr/local/bin/llama-server
  rpc_server: /usr/local/bin/rpc-server
