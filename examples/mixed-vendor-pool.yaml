# Mixed-vendor GPU pool — NVIDIA + AMD across machines
# This is Tightwad's selling point: pool GPUs regardless of vendor.
#
# Use case: You have NVIDIA GPUs on one machine and AMD GPUs
# on another. Pool them all into one endpoint.

coordinator:
  host: 192.168.1.10       # Machine running the coordinator
  port: 8080
  backend: cuda            # coordinator-local backend ("cuda" or "hip")

workers:
  # NVIDIA machine
  - host: 192.168.1.10
    gpus:
      - name: RTX 4070 Ti Super
        vram_gb: 16
        rpc_port: 50052

  # AMD machine (needs ROCm + llama.cpp HIP backend)
  - host: 192.168.1.20
    gpus:
      - name: RX 7900 XTX
        vram_gb: 24
        rpc_port: 50052

models:
  qwen3-32b:
    name: Qwen3 32B
    path: /models/qwen3-32b-Q4_K_M.gguf
    default: true
    # Tensor split is computed automatically, proportional to each GPU's
    # vram_gb (here 16:24 ≈ 40:60, giving the AMD card more layers).

binaries:
  coordinator: /usr/local/bin/llama-server
  rpc_server: /usr/local/bin/rpc-server
